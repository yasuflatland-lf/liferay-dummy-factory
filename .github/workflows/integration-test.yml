name: Integration Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  integration-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Yarn via Corepack
        run: corepack enable

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Provision DXP activation key (from base64 secret)
        env:
          LIFERAY_DXP_LICENSE_BASE64: ${{ secrets.LIFERAY_DXP_LICENSE_BASE64 }}
        run: |
          if [ -z "${LIFERAY_DXP_LICENSE_BASE64}" ]; then
            echo "::error::LIFERAY_DXP_LICENSE_BASE64 secret is not set"
            exit 1
          fi
          # Gradle's resolveLicenseFile task reads LIFERAY_DXP_LICENSE_BASE64 and decodes it.
          # No pre-decode needed here; passing via env is sufficient.

      - name: Build Docker deploy context
        env:
          LIFERAY_DXP_LICENSE_BASE64: ${{ secrets.LIFERAY_DXP_LICENSE_BASE64 }}
        run: |
          ./gradlew :modules:liferay-dummy-factory:jar \
                    :dockerDeploy \
                    :modules:liferay-dummy-factory:dockerDeploy \
                    --no-daemon --info

      - name: Make bind-mount directories writable by both runner (UID 1001) and container liferay (UID 1000)
        # The workspace plugin bind-mounts build/docker/{deploy,work,client-extensions}
        # into the container. GitHub runner's user is UID 1001, but the container's
        # liferay user is UID 1000. Without shared write access, /mnt/liferay/deploy
        # appears unwritable to liferay (UID 1000), so AutoDeployScanner logs
        # "Unable to write" then loops forever on "Processing" because
        # FileUtil.move silently fails to delete the source file.
        #
        # chown to UID 1000 would flip the problem — Gradle's subsequent dockerDeploy
        # (run again by the next Gradle invocation because the JAR rebuilt) can no
        # longer copy the JAR in as the runner. chmod a+rwX gives both users full
        # access without changing ownership, so both the runner's Gradle tasks and
        # the container's AutoDeployScanner can create/delete files freely.
        run: |
          sudo mkdir -p build/docker/deploy build/docker/work build/docker/client-extensions
          sudo chmod -R a+rwX build/docker/deploy build/docker/work build/docker/client-extensions

      - name: Run integration tests
        env:
          LIFERAY_DXP_LICENSE_BASE64: ${{ secrets.LIFERAY_DXP_LICENSE_BASE64 }}
        run: |
          ./gradlew :integration-test:integrationTest --no-daemon --info

      - name: Verify integration JaCoCo XML exists
        if: always()
        run: |
          f=integration-test/build/reports/jacoco/integration/jacoco.xml
          if [ ! -s "$f" ]; then
            echo "::error::Integration JaCoCo XML missing or empty at $f — jacocoIntegrationReport was skipped. Common causes: (a) :createDockerContainer failed before tests ran; (b) ExecDumpClient could not reach 127.0.0.1:6300 in BaseLiferaySpec.cleanupSpec; (c) all tests were filtered out."
            exit 1
          fi

      - name: Upload integration coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: integration-test/build/reports/jacoco/integration/jacoco.xml
          flags: integration
          fail_ci_if_error: false

      - name: Collect Liferay container diagnostics on failure
        if: failure()
        env:
          CONTAINER: liferay-dummy-factory-liferay
        run: |
          DIAG=integration-test/build/reports/container
          mkdir -p "${DIAG}"
          docker logs "${CONTAINER}" 2>&1 | gzip > "${DIAG}/liferay.log.gz" || true
          docker inspect "${CONTAINER}" > "${DIAG}/inspect.json" 2>&1 || true
          docker ps -a > "${DIAG}/ps.txt" 2>&1 || true
          docker cp "${CONTAINER}:/opt/liferay/deploy" "${DIAG}/deploy" 2>&1 || true
          find "${DIAG}/deploy" -name "*.xml" -o -name "*.lic" | xargs rm -f 2>/dev/null || true
          docker cp "${CONTAINER}:/opt/liferay/logs" "${DIAG}/liferay-logs" 2>&1 || true
          ls -laR "${DIAG}" || true

      - name: Upload integration test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-report
          path: |
            integration-test/build/reports/tests/
            integration-test/build/reports/jacoco/
            integration-test/build/reports/container/
