# Disable setup wizard, terms of use, reminder queries, and password-change prompts.
# D2: suppress PASSWORDRESET flag via portal-ext so BaseLiferaySpec login stays simple.
setup.wizard.enabled=false
terms.of.use.required=false
users.reminder.queries.enabled=false
passwords.default.policy.change.required=false
company.security.update.password.required=false
company.security.strangers=false
company.security.strangers.verify=false

# Silence DXP 2026 first-boot notifications.
admin.email.user.added.enabled=false
enterprise.product.notification.enabled=false

# Open JSONWS (empty allowlist = all hosts).
json.servlet.hosts.allowed=
json.web.service.enabled=true
jsonws.web.service.api.discoverable=true

# Bypass JSONAction CSRF for JSONWS so BasicAuth-authenticated integration
# tests don't hit PrincipalException$MustHaveSessionCSRFToken. DXP 2026
# requires a per-session CSRF token for JSONWebServiceServiceAction origin;
# BasicAuth-only callers never establish one. Whitelisting the origin here
# is equivalent to "auth.token.check.enabled=false" but scoped to JSONWS.
auth.token.ignore.origins=com.liferay.portal.remote.json.web.service.web.internal.JSONWebServiceServiceAction

# Register BasicAuthHeaderAuthVerifier on the JSON Web Service Servlet Filter.
# The filter declared in shielded-container-web.xml maps /api/jsonws/* and
# reads init params from portal properties prefixed with "jsonws.servlet.",
# so these entries become the filter's auth.verifier.* settings
# (AuthVerifierFilter:68-79). Without them BasicAuth silently falls through
# to the Guest user on /api/jsonws/* even though the same credentials work
# on /o/* (which uses the generic AuthVerifierFilterTracker pipeline).
jsonws.servlet.auth.verifier.BasicAuthHeaderAuthVerifier.urls.includes=*
jsonws.servlet.auth.verifier.BasicAuthHeaderAuthVerifier.basic_auth=true
jsonws.servlet.auth.verifier.PortalSessionAuthVerifier.urls.includes=*

# Widen SYSTEM_DEFAULT Service Access Policy to all services for integration tests.
# Without this, the default SYSTEM_DEFAULT entry only allows Country/Region,
# and SYSTEM_USER_PASSWORD requires passwordBasedAuthentication=true which does
# not propagate reliably on every DXP 2026 BasicAuth path.
configuration.override.com.liferay.portal.security.service.access.policy.configuration.SAPConfiguration_systemDefaultSAPEntryServiceSignatures=*
